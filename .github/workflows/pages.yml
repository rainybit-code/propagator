name: pages

# Deploy the static site to GitHub Pages, bundling the latest Spore firmware .bin
# under /firmware/ so the flash wizard can fetch it same-origin.
# Runs on push to main, daily, and on demand. Needs Pages "Source" = "GitHub Actions".
on:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * *'      # daily — refresh the bundled firmware if a new release shipped
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # build assembles the site + firmware artifact; deploy publishes it.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site + bundle latest Spore firmware
        run: |
          mkdir -p _site/firmware
          cp index.html app.js dfu.js styles.css presets.json _site/
          touch _site/.nojekyll
          REL="$(curl -s https://api.github.com/repos/rainybit-code/spore/releases/latest)"
          TAG="$(printf '%s' "$REL" | grep -oE '"tag_name":[ ]*"[^"]*"' | head -1 | sed -E 's/.*"([^"]*)"$/\1/')"
          # The release ships two .bin assets: the app and the (Daisy) bootloader. Pick each
          # explicitly -- the app is the .bin that is NOT the bootloader.
          URLS="$(printf '%s' "$REL" | grep -oE '"browser_download_url":[ ]*"[^"]*\.bin"' | sed -E 's/.*"(https[^"]*)"$/\1/')"
          APP_URL="$(printf '%s\n' "$URLS" | grep -v 'bootloader' | head -1)"
          BOOT_URL="$(printf '%s\n' "$URLS" | grep 'bootloader' | head -1)"
          if [ -n "$APP_URL" ]; then
            curl -sL "$APP_URL" -o _site/firmware/spore-latest.bin
            SIZE="$(wc -c < _site/firmware/spore-latest.bin)"
            BOOT_JSON=""
            if [ -n "$BOOT_URL" ]; then
              curl -sL "$BOOT_URL" -o _site/firmware/spore-bootloader.bin
              BSIZE="$(wc -c < _site/firmware/spore-bootloader.bin)"
              BOOT_JSON=",\"bootFile\":\"spore-bootloader.bin\",\"bootSize\":$BSIZE"
            fi
            printf '{"version":"%s","file":"spore-latest.bin","size":%s%s}\n' "$TAG" "$SIZE" "$BOOT_JSON" > _site/firmware/latest.json
            echo "bundled app $TAG ($SIZE bytes)${BOOT_URL:+ + bootloader}"
          else
            printf '{"version":null}\n' > _site/firmware/latest.json
            echo "no release asset found — site deploys without bundled firmware"
          fi
          cat _site/firmware/latest.json

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
