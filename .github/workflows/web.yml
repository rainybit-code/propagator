name: web

# Validate the static site on every push/PR (deploy is handled by pages.yml).
# On a version tag (vX.Y.Z), attach a zipped copy of the site to a GitHub Release.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  changelog:
    # Require a CHANGELOG.md entry on PRs. Skipped for PRs labelled
    # 'skip-changelog' or 'dependencies'.
    if: >-
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-changelog') &&
      !contains(github.event.pull_request.labels.*.name, 'dependencies')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a CHANGELOG entry
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          if git diff --quiet "$base" HEAD -- CHANGELOG.md; then
            echo "::error::This PR doesn't update CHANGELOG.md. Add a note under '## [Unreleased]', or label the PR 'skip-changelog'."
            exit 1
          fi
          echo "CHANGELOG.md updated."

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax-check scripts
        run: for f in core.js dfu.js app.js; do node --check "$f"; done

      - name: Validate presets.json
        run: node -e "JSON.parse(require('fs').readFileSync('presets.json','utf8')); console.log('presets.json OK')"

      - name: Check formatting (Prettier)
        run: npx --yes prettier@3 --check .

      - name: Lint (ESLint)
        run: npx --yes eslint@9 .

      - name: Unit tests
        run: node --test

      - name: Package site (tags only)
        if: github.ref_type == 'tag'
        run: |
          mkdir -p dist
          zip -r "dist/propagator-${GITHUB_REF_NAME}.zip" \
            index.html app.js core.js dfu.js styles.css presets.json .nojekyll README.md LICENSE

      - name: Extract changelog section for this tag
        if: github.ref_type == 'tag'
        run: |
          awk -v h="## [${GITHUB_REF_NAME}]" 'index($0,h)==1{f=1;next} f&&(/^## \[/||/^<!--/){exit} f{print}' \
            CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then echo "Release ${GITHUB_REF_NAME}" > RELEASE_NOTES.md; fi
          echo "----- release notes -----"; cat RELEASE_NOTES.md

      - name: Publish Release (tags only)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body_path: RELEASE_NOTES.md
